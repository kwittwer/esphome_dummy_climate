# ============================================
# Dummy Thermostat - Basis
# Enthält: externe Component und globale Schalter
#
# Einbindung in device config:
#   packages:
#     thermostat:
#       url: https://github.com/kwittwer/esphome_dummy_climate
#       ref: main
#       files:
#         - path: thermostat_base.yaml
# ============================================

external_components:
  - source:
      type: git
      url: https://github.com/kwittwer/esphome_dummy_climate
      ref: main
      path: components
    components: [dummy_thermostat]

# ============================================
# Globale Schalter (für alle Thermostat-Instanzen)
# ============================================

switch:
  - platform: template
    name: "Lokale Heizregelung"
    id: local_control_switch
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    name: "Heizung Hauptschalter"
    id: heating_master_switch
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    optimistic: true
