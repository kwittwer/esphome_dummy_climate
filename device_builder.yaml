# ============================================
# Dummy Thermostat - Device Builder Entry
#
# Diese Datei ist der Einstieg für den neuen ESPHome Device Builder.
# Hier werden nur Substitutions bearbeitet; die Implementierung kommt
# aus dem GitHub-Repo über packages.
# ============================================

substitutions:
  device_name: "dummy_thermostat"
  friendly_name: "Dummy Thermostat"
  thermostat_id: "1"
  thermostat_name: "Wohnzimmer"
  thermostat_fallback_sensor: "sensor_dht_1_temperature"
  thermostat_fallback_humidity_sensor: "sensor_dht_1_humidity"
  thermostat_valve_switch: "DO1"
  thermostat_external_sensor_timeout: "900"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

packages:
  thermostat:
    url: https://github.com/kwittwer/esphome_dummy_climate
    ref: main
    files:
      - path: thermostat_base.yaml
      - path: thermostat_template.yaml
        vars:
          thermostat_id: ${thermostat_id}
          thermostat_name: ${thermostat_name}
          thermostat_fallback_sensor: ${thermostat_fallback_sensor}
          thermostat_fallback_humidity_sensor: ${thermostat_fallback_humidity_sensor}
          thermostat_valve_switch: ${thermostat_valve_switch}
          Thermostat_external_sensor_timeout: ${thermostat_external_sensor_timeout}

dashboard_import:
  package_import_url: github://kwittwer/esphome_dummy_climate/device_builder.yaml@main
  import_full_config: false
